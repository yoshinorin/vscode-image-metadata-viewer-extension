name: Lint

on:
  push:
    paths:
      - '**.ts'
      - '**.js'
      - '**.json'
  pull_request:
    paths:
      - '**.ts'
      - '**.js'
      - '**.json'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['24.x']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
      - name: Install Dependencies
        run: npm install
      - name: Lint
        run: npm run lint
